<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Reloj Minimalista Pro</title>
<style>
  :root { 
    --base-rem: 7.5; 
    --accent-color: #00ff00;
    --bg-color: #000000;
  }
  body {
    margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; font-family: monospace; background: var(--bg-color); color: var(--accent-color);
    transition: background 0.3s, color 0.3s;
    overflow: hidden;
  }
  #clock {
    font-size: calc(var(--base-rem) * 1rem);
    letter-spacing: 4px;
    cursor: pointer;
    user-select: none;
    text-align: center;
  }
  #date {
    font-size: calc(var(--base-rem) * 0.35rem);
    letter-spacing: 2px;
    margin-top: 10px;
    opacity: 0.8;
    user-select: none;
    text-align: center;
  }
  
  /* Botón de ajustes flotante */
  #settingsToggle {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: inherit;
    font-size: 1.5rem;
    padding: 8px 12px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    transition: transform 0.2s;
  }
  #settingsToggle:hover {
    transform: scale(1.1);
  }

  .controls {
    position: absolute;
    bottom: 80px;
    background: rgba(0, 0, 0, 0.95);
    border: 1px solid #333;
    padding: 15px;
    border-radius: 8px;
    display: none; /* Se maneja por JS */
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 90%;
    z-index: 9;
    box-shadow: 0 4px 20px rgba(0,0,0,0.8);
  }
  label { font-size: 0.85rem; color:#ddd; display: flex; flex-direction: column; gap: 4px; }
  select, input[type="color"], input[type="time"], button {
    padding:.4rem .6rem; border:1px solid #444; border-radius:4px; background:#111; color:#fff;
    font-family: inherit;
  }
  button {
    cursor:pointer; font-weight:600; border-color:#555;
    transition: background 0.2s;
  }
  button:hover { background:#333; }
  
  /* Botón de detener alarma */
  #stopAlarmBtn {
    background: #ff3333;
    color: white;
    border: none;
    display: none;
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1.1rem;
    border-radius: 4px;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  /* Notificaciones elegantes de UI */
  .toast {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(30, 30, 30, 0.9);
    color: #fff;
    border: 1px solid var(--accent-color);
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 0.9rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    z-index: 100;
    opacity: 0;
    transform: translateY(-20px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<div id="clock" tabindex="0" aria-label="Reloj"></div>
<div id="date"></div>

<button id="stopAlarmBtn">🔕 Detener Alarma</button>

<button id="settingsToggle" title="Ajustes">⚙️</button>

<div class="controls" id="controls" aria-live="polite">
  <label>Formato:
    <select id="format">
      <option value="24">24h</option>
      <option value="12">12h</option>
    </select>
  </label>
  <label>Tamaño:
    <select id="size">
      <option value="25">25%</option>
      <option value="50">50%</option>
      <option value="75">75%</option>
      <option value="100" selected>100%</option>
      <option value="150">150%</option>
      <option value="200">200%</option>
    </select>
  </label>
  <label>Fuente:
    <select id="font">
      <option value="monospace">Monospace</option>
      <option value="sans-serif">Sans Serif</option>
      <option value="serif">Serif</option>
      <option value="'Courier New', monospace">Courier</option>
    </select>
  </label>
  <label>Color números:
    <input type="color" id="color" value="#00ff00" />
  </label>
  <label>Color fondo:
    <input type="color" id="bgcolor" value="#000000" />
  </label>
  <label>Alarma:
    <input type="time" id="alarmTime" />
  </label>
  <button id="setAlarm">Activar</button>
  <button id="clearAlarm">Quitar</button>
  <button id="fullscreenBtn">⛶ Pantalla completa</button>
</div>

<!-- Elemento contenedor para notificaciones tipo Toast -->
<div id="toast" class="toast" role="alert"></div>

<!-- Audios con fallback de respaldo integrado -->
<audio id="alarmSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" preload="auto" loop></audio>
<audio id="hourChime" src="https://actions.google.com/sounds/v1/alarms/gentle_bell.ogg" preload="auto"></audio>

<script>
  // Elementos
  const clock = document.getElementById('clock');
  const date = document.getElementById('date');
  const controls = document.getElementById('controls');
  const settingsToggle = document.getElementById('settingsToggle');
  const formatSel = document.getElementById('format');
  const sizeSel = document.getElementById('size');
  const fontSel = document.getElementById('font');
  const colorSel = document.getElementById('color');
  const bgSel = document.getElementById('bgcolor');
  const alarmInput = document.getElementById('alarmTime');
  const setAlarmBtn = document.getElementById('setAlarm');
  const clearAlarmBtn = document.getElementById('clearAlarm');
  const stopAlarmBtn = document.getElementById('stopAlarmBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const alarmSound = document.getElementById('alarmSound');
  const hourChime = document.getElementById('hourChime');
  const toast = document.getElementById('toast');

  // Estado
  let alarmTime = null;
  let alarmActive = false;
  let isRinging = false;
  let hideTimeout = null;
  let lastHour = new Date().getHours();
  let wakeLock = null;
  let vibrationInterval = null;

  // Sistema de notificación discreto para evitar alerts intrusivos
  function showToast(message) {
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
    }, 3000);
  }

  // 1. Prevención de Apagado de Pantalla (Wake Lock)
  async function requestWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
      }
    } catch (err) {
      console.warn(`No se pudo activar el bloqueo de suspensión: ${err.message}`);
    }
  }

  // Volver a activar Wake Lock si la app vuelve a estar visible
  document.addEventListener('visibilitychange', async () => {
    if (wakeLock !== null && document.visibilityState === 'visible') {
      await requestWakeLock();
    }
  });

  // Inicializar Wake Lock al hacer clic en cualquier lado
  document.addEventListener('click', () => {
    if (!wakeLock) requestWakeLock();
  }, { once: true });

  // Cargar preferencias
  (function loadPrefs(){
    const saved = localStorage.getItem('clock_prefs');
    if(!saved) return;
    const prefs = JSON.parse(saved);
    if(prefs.format) formatSel.value = prefs.format;
    if(prefs.size)   sizeSel.value = prefs.size;
    if(prefs.font)   { fontSel.value = prefs.font; document.body.style.fontFamily = prefs.font; }
    if(prefs.color)  { colorSel.value = prefs.color; document.body.style.color = prefs.color; document.documentElement.style.setProperty('--accent-color', prefs.color); }
    if(prefs.bg)     { bgSel.value = prefs.bg; document.body.style.backgroundColor = prefs.bg; document.documentElement.style.setProperty('--bg-color', prefs.bg); }
    if(prefs.alarmTime) {
      alarmInput.value = prefs.alarmTime;
      alarmTime = prefs.alarmTime;
      alarmActive = true;
    }
    applySize();
  })();

  function savePrefs(){
    const prefs = {
      format: formatSel.value,
      size: sizeSel.value,
      font: fontSel.value,
      color: colorSel.value,
      bg: bgSel.value,
      alarmTime: alarmActive ? alarmTime : null
    };
    localStorage.setItem('clock_prefs', JSON.stringify(prefs));
  }

  function two(n){ return String(n).padStart(2,'0'); }

  function updateClock(){
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();
    let suffix = '';

    // Sonido cada hora en punto
    if (h !== lastHour && m === 0 && s <= 1) {
      hourChime.currentTime = 0;
      hourChime.play().catch(()=>{});
      lastHour = h;
    }

    if (formatSel.value === '12') {
      suffix = h >= 12 ? ' PM' : ' AM';
      h = h % 12 || 12;
    }
    clock.textContent = `${two(h)}:${two(m)}:${two(s)}${suffix}`;

    // Actualizar fecha en español
    const options = { 
      weekday: 'long', 
      year: 'numeric', 
      month: 'long', 
      day: 'numeric' 
    };
    date.textContent = now.toLocaleDateString('es-ES', options);

    // Activación de Alarma
    if (alarmActive && alarmTime && !isRinging) {
      const currentHM = `${two(now.getHours())}:${two(now.getMinutes())}`;
      if (currentHM === alarmTime) {
        triggerAlarm();
      }
    }
  }

  // Activa sonido, vibración intermitente continua y muestra botón de apagado
  function triggerAlarm() {
    isRinging = true;
    alarmSound.currentTime = 0;
    alarmSound.play().catch(()=>{});
    
    // Vibración recurrente en dispositivos móviles (cada 2.5 segundos)
    if ('vibrate' in navigator) {
      navigator.vibrate([500, 250, 500]);
      vibrationInterval = setInterval(() => {
        navigator.vibrate([500, 250, 500]);
      }, 2500);
    }

    stopAlarmBtn.style.display = 'block';
  }

  // Detener Alarma activa
  stopAlarmBtn.addEventListener('click', () => {
    alarmSound.pause();
    alarmSound.currentTime = 0;
    if (vibrationInterval) {
      clearInterval(vibrationInterval);
      vibrationInterval = null;
    }
    if ('vibrate' in navigator) {
      navigator.vibrate(0); // Forzar detención final
    }
    stopAlarmBtn.style.display = 'none';
    isRinging = false;
    alarmActive = false; // Desactivar para evitar repeticiones del mismo minuto
    savePrefs();
    showToast('Alarma desactivada');
  });

  // Tamaño del reloj según selector
  function applySize(){
    const pct = parseInt(sizeSel.value, 10) || 100;
    const baseRem = 7.5;
    clock.style.fontSize = (baseRem * (pct/100)) + 'rem';
    date.style.fontSize = (baseRem * 0.35 * (pct/100)) + 'rem';
  }

  // Mostrar/ocultar controles de manera inteligente
  function toggleControls() {
    if (controls.style.display === 'flex') {
      hideControls();
    } else {
      showControls();
    }
  }

  function showControls(){
    controls.style.display = 'flex';
    resetHideTimer();
  }

  function hideControls() {
    controls.style.display = 'none';
    clearTimeout(hideTimeout);
  }

  function resetHideTimer(){
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(()=>{
      if (!controls.matches(':hover') && !controls.contains(document.activeElement)) {
        hideControls();
      } else {
        resetHideTimer();
      }
    }, 8000);
  }

  // Eventos de interacción con el botón y el reloj
  settingsToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleControls();
  });
  clock.addEventListener('click', showControls);

  // Mantener visibles mientras se edita o hay interacción
  controls.addEventListener('mouseenter', resetHideTimer);
  controls.addEventListener('input', resetHideTimer);
  controls.addEventListener('change', resetHideTimer);
  controls.addEventListener('focusin', () => clearTimeout(hideTimeout));
  controls.addEventListener('focusout', resetHideTimer);
  
  // Ocultar al hacer clic fuera del panel de control
  document.addEventListener('click', (e) => {
    if (!controls.contains(e.target) && e.target !== settingsToggle && e.target !== clock) {
      hideControls();
    }
  });

  // Personalización interactiva de colores y estilos
  formatSel.addEventListener('change', ()=>{ updateClock(); savePrefs(); });
  sizeSel.addEventListener('change', ()=>{ applySize(); savePrefs(); });
  fontSel.addEventListener('change', ()=>{ document.body.style.fontFamily = fontSel.value; savePrefs(); });
  
  colorSel.addEventListener('input', ()=>{ 
    document.body.style.color = colorSel.value; 
    document.documentElement.style.setProperty('--accent-color', colorSel.value);
    savePrefs(); 
  });
  
  bgSel.addEventListener('input', ()=>{ 
    document.body.style.backgroundColor = bgSel.value; 
    document.documentElement.style.setProperty('--bg-color', bgSel.value);
    savePrefs(); 
  });

  // Eventos de la Alarma
  setAlarmBtn.addEventListener('click', ()=>{
    if (alarmInput.value) {
      alarmTime = alarmInput.value;
      alarmActive = true;
      savePrefs();
      showToast('Alarma establecida para las ' + alarmTime);
    } else {
      showToast('Por favor, selecciona una hora válida');
    }
  });
  
  clearAlarmBtn.addEventListener('click', ()=>{
    alarmTime = null;
    alarmActive = false;
    isRinging = false;
    alarmSound.pause();
    if (vibrationInterval) {
      clearInterval(vibrationInterval);
      vibrationInterval = null;
    }
    stopAlarmBtn.style.display = 'none';
    savePrefs();
    showToast('Alarma eliminada');
  });

  // Gestión de pantalla completa nativa
  fullscreenBtn.addEventListener('click', ()=>{
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen();
    }
  });

  // Inicialización y arranque del ciclo
  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
